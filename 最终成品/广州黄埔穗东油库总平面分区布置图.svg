  <text x="350" y="3560" class="t26 bold">设计依据与限制条件</text>
  <text x="350" y="3610" class="t22">
    <tspan x="350" dy="0">① GB 50074—2014《石油库设计规范》第5.1、5.2、5.3、6.1、6.5、8.2节；GB/T 50103—2010《总图制图标准》；</tspan>
    <tspan x="350" dy="38">　 SY/T 0003—2021《石油天然气工程制图规范》。汽油采用密闭底部装车并配套油气回收。</tspan>
    <tspan x="350" dy="46">② 建设地点：广州市黄埔区穗东街道附近；年均温22.6℃，年降雨量2240mm，最大日降雨量346mm，</tspan>
    <tspan x="350" dy="38">　 主导风向偏北、年平均风速2.0m/s、最大风速32.8m/s。排水、防洪防潮及抗风设计须专项校核。</tspan>
    <tspan x="350" dy="46">③ 本图用于毕业设计总体方案与论文插图。因缺少正式用地红线、1∶500地形图、地勘、洪潮水位、全年风玫瑰图及市政接口资料，</tspan>
    <tspan x="350" dy="38">　 不得直接作为施工图或报批总图；实际工程须由具备相应资质的设计单位复核全部防火间距、标高和构筑物尺寸。</tspan>
  </text>

