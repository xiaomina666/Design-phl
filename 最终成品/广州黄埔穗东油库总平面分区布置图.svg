  <line x1="4680" y1="2640" x2="4860" y2="2640" class="product"/><text x="4910" y="2648" class="t22">管输出库主管</text>
  <line x1="4680" y1="2710" x2="4860" y2="2710" class="fire"/><text x="4910" y="2718" class="t22">消防给水管网</text>
  <line x1="4680" y1="2780" x2="4860" y2="2780" class="drain"/><text x="4910" y="2788" class="t22">排水沟/坡向</text>
  <circle cx="4770" cy="2860" r="65" fill="#fff" stroke="#111" stroke-width="7"/><text x="4910" y="2868" class="t22">立式储罐</text>

  <rect x="4620" y="3010" width="1160" height="420" class="med"/>
  <text x="5200" y="3060" class="t28 bold center">方案用地指标</text>
  <text x="4680" y="3120" class="t22">围墙内方案范围：420m×300m</text>
  <text x="4680" y="3160" class="t22">方案占地面积：126000m²（12.60ha）</text>
  <text x="4680" y="3200" class="t22">储罐：8座×10000m³；总公称容量80000m³</text>
  <text x="4680" y="3240" class="t22">油库等级：二级；年周转量：67×10⁴t/a</text>
  <text x="4680" y="3280" class="t22">注：用地边界为毕业设计方案假定，非实测红线。</text>
  <text x="4680" y="3320" class="t22">建筑面积、道路率、绿地率待建筑单体确定后统计。</text>

