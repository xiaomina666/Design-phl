      .building{fill:#f7f7f7;stroke:#111;stroke-width:8}.hazard{fill:#fff0d5;stroke:#111;stroke-width:8}
      .water{fill:#dff4ff;stroke:#1479a3;stroke-width:8}.green{fill:#e9f6e7;stroke:#4b7d46;stroke-width:5}
      .zoneA{fill:#fffaf0}.zoneB{fill:#f3f8ff}.zoneC{fill:#fff7ef}.zoneD{fill:#f6fbf3}
      .t18{font-size:18px}.t22{font-size:22px}.t26{font-size:26px}.t30{font-size:30px}.t34{font-size:34px}.t40{font-size:40px}.t48{font-size:48px}
