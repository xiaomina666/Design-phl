  <!-- right-side notes and legend -->
  <rect x="4620" y="700" width="1160" height="1430" class="med"/>
  <text x="5200" y="750" class="t30 bold center">总图控制说明</text>
  <text x="4670" y="810" class="note">
    <tspan x="4670" dy="0">1. 本图按GB 50074—2014分为储油区、</tspan>
    <tspan x="4670" dy="38">装卸区、辅助生产区和行政管理区。</tspan>
    <tspan x="4670" dy="48">2. 0号柴油按丙A类固定顶罐绘制，</tspan>
    <tspan x="4670" dy="38">不是丙B类。</tspan>
    <tspan x="4670" dy="48">3. 10000m³罐暂按D=30m、H=16.58m；</tspan>
    <tspan x="4670" dy="38">同组罐壁净距12m（0.4D）。</tspan>
    <tspan x="4670" dy="48">4. 防火堤至罐壁距离按≥0.5H控制，</tspan>
    <tspan x="4670" dy="38">有效容积须经下一阶段单独核算。</tspan>
    <tspan x="4670" dy="48">5. 消防车道总宽≥6m、路面≥4m、</tspan>
    <tspan x="4670" dy="38">转弯半径≥12m、净空≥5m。</tspan>
    <tspan x="4670" dy="48">6. 行政区南置为当前方案。GB 50074</tspan>
    <tspan x="4670" dy="38">第5.1.12条要求其位于储罐区全年最小</tspan>
    <tspan x="4670" dy="38">频率风向下风侧，须取得完整风玫瑰图</tspan>
    <tspan x="4670" dy="38">后复核；“主导北风”不能代替该数据。</tspan>
    <tspan x="4670" dy="48">7. 穗东邻近珠江水系，H1～H4及场地</tspan>
    <tspan x="4670" dy="38">最低标高须依据地形测量、设计洪潮水位</tspan>
    <tspan x="4670" dy="38">和GB 50074第5.3.1条确定。</tspan>
  </text>

